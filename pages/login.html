<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../CapslockLogo.png" type="png">
  <title>CapsLock — Login</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="login-container">

    <div class="login-left">
      <div style="
        position: absolute;
        inset: 0;
        background-image: url('https://images.unsplash.com/photo-1600880292203-757bb62b4baf?w=1200&q=80');
        background-size: cover;
        background-position: center;
        border-radius: 0;
      "></div>

      <div style="
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(15,23,42,0.75), rgba(30,58,95,0.80));
      "></div>

      <div style="position: relative; z-index: 1;">
        <div class="brand">
          <img src="../CapslockLogo.png" alt="CapsLock Logo" style="width:36px; height:36px; object-fit:contain; border-radius:8px;">
          <span class="text-base font-bold text-slate-900 tracking-tight" style="margin-left: -10px;">ap<span class="text-blue-600">Sight</span></span>
        </div>
        <h1>Your Advisory<br>Platform</h1>
        <p>Manage clients, track learning, and grow your network — all in one place.</p>
      </div>
    </div>

    <div class="login-right">
      <div class="login-box">
        <h2>Welcome Back!</h2>
        <p class="subtitle">Login to your CapsLock account</p>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="sarah@mail.com" />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="pw123" />
        </div>

        <p class="error-msg" id="error-msg"></p>

        <button class="login-btn" onclick="handleLogin()">Login</button>

        <p class="forgot">Forgot password? <a href="#">Reset here</a></p>
      </div>
    </div>

  </div>

  <script src="../js/login.js"></script>
</body>
</html>
